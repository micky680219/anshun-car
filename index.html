    const table = document.getElementById('dataTable');
    const counter = document.getElementById('countDisplay');
    const emptyMsg = document.getElementById('emptyMsg');

    function filterData() {
        const query = document.getElementById('searchInput').value.trim().toUpperCase();
        
        // 如果輸入框是空的，清空結果並顯示提示
        if (query === "") {
            table.innerHTML = "";
            counter.innerText = "請輸入關鍵字開始查詢";
            emptyMsg.innerText = "尚未輸入搜尋內容";
            emptyMsg.style.display = "block";
            return;
        }

        const filtered = dataList.filter(item => 
            item.id.includes(query) || 
            item.name.includes(query) ||
            item.p1.toUpperCase().replace(/-/g, '').includes(query.replace(/-/g, '')) ||
            item.p2.toUpperCase().replace(/-/g, '').includes(query.replace(/-/g, ''))
        );
        
        render(filtered);
    }

    function render(list) {
        if (list.length === 0) {
            table.innerHTML = "";
            counter.innerText = "找不到相關資料";
            emptyMsg.innerText = "查無此編號、姓名或車牌";
            emptyMsg.style.display = "block";
        } else {
            emptyMsg.style.display = "none";
            table.innerHTML = list.map(item => `
                <tr>
                    <td><span class="id-text">${item.id}</span></td>
                    <td>
                        <div class="name-text">${item.name}</div>
                        <div class="loc-text">${item.loc}</div>
                    </td>
                    <td>
                        <div class="plate-text">${item.p1 || '-'}</div>
                        <div class="plate-text" style="margin-top:4px">${item.p2 || ''}</div>
                    </td>
                </tr>
            `).join('');
            counter.innerText = `符合條件：${list.length} 筆`;
        }
    }
</script>

</body>
</html>
